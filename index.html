<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flashcards</title>
  <link rel="stylesheet" href="./public/stylesheets/style.css" />
  <style>
    body {
      padding: 0;
    }

    .index-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, rgba(122, 162, 255, 0.12) 0%, rgba(122, 162, 255, 0.06) 100%);
      border-right: 1px solid rgba(122, 162, 255, 0.2);
      padding: 28px 20px;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 16px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode-btn {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(122, 162, 255, 0.25);
      background: rgba(17, 26, 46, 0.55);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .mode-btn.active {
      background: rgba(122, 162, 255, 0.22);
      border-color: rgba(122, 162, 255, 0.55);
      color: var(--text);
    }

    .sidebar-group.hidden {
      display: none;
    }

    .category-btn {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: transparent;
      border: 1px solid rgba(122, 162, 255, 0.2);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .category-btn:hover {
      background: rgba(122, 162, 255, 0.1);
      border-color: rgba(122, 162, 255, 0.4);
    }

    .category-btn.active {
      background: rgba(122, 162, 255, 0.25);
      border-color: rgba(122, 162, 255, 0.6);
      color: var(--text);
      font-weight: 600;
    }

    .category-icon {
      font-size: 16px;
      min-width: 20px;
      text-align: center;
    }

    .category-name {
      flex: 1;
    }

    .category-count {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .main-content {
      flex: 1;
      padding: 28px;
      overflow-y: auto;
    }

    .content-header {
      margin-bottom: 28px;
    }

    .content-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 6px 0;
    }

    .content-subtitle {
      font-size: 14px;
      color: var(--muted);
      margin: 0;
    }

    .sidebar-search {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .search-input {
      flex: 1;
      padding: 10px 12px;
      background: rgba(17, 26, 46, 0.6);
      border: 1px solid rgba(122, 162, 255, 0.25);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-input:focus {
      outline: none;
      border-color: rgba(122, 162, 255, 0.5);
      background: rgba(17, 26, 46, 0.8);
    }

    .search-clear-btn {
      padding: 8px 12px;
      background: rgba(122, 162, 255, 0.15);
      border: 1px solid rgba(122, 162, 255, 0.3);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s ease;
      min-width: 40px;
    }

    .search-clear-btn:hover {
      background: rgba(122, 162, 255, 0.25);
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .embedded-view {
      grid-column: 1 / -1;
      border: 1px solid rgba(122, 162, 255, 0.2);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(17, 26, 46, 0.4);
      min-height: 86vh;
      box-shadow: 0 8px 24px rgba(122, 162, 255, 0.12);
    }

    .embedded-view iframe {
      display: block;
      width: 100%;
      height: 86vh;
      border: 0;
      background: transparent;
    }

    .embedded-topic-toolbar {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(122, 162, 255, 0.2);
      border-radius: 10px;
      background: rgba(17, 26, 46, 0.5);
    }

    .embedded-topic-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .embedded-topic-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(122, 162, 255, 0.35);
      background: rgba(122, 162, 255, 0.18);
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .embedded-topic-btn:hover {
      background: rgba(122, 162, 255, 0.28);
    }

    .item-card {
      padding: 24px;
      background: linear-gradient(135deg, rgba(17, 26, 46, 0.6) 0%, rgba(17, 26, 46, 0.3) 100%);
      border: 1px solid rgba(122, 162, 255, 0.15);
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 280px;
      cursor: pointer;
    }

    .item-card:hover {
      background: linear-gradient(135deg, rgba(122, 162, 255, 0.15) 0%, rgba(122, 162, 255, 0.05) 100%);
      border-color: rgba(122, 162, 255, 0.3);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(122, 162, 255, 0.15);
    }

    .item-card-header {
      margin-bottom: 20px;
      flex-grow: 1;
    }

    .item-card-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px 0;
      line-height: 1.2;
    }

    .item-card-subtitle {
      font-size: 13px;
      color: rgba(122, 162, 255, 0.7);
      margin: 0;
      font-weight: 500;
    }

    .item-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .tag-type {
      background: rgba(122, 162, 255, 0.25);
      color: rgba(122, 162, 255, 0.9);
      border: 1px solid rgba(122, 162, 255, 0.3);
    }

    .tag-verb {
      background: rgba(255, 180, 50, 0.25);
      color: rgba(255, 180, 50, 0.9);
      border: 1px solid rgba(255, 180, 50, 0.3);
    }

    .tag-complement {
      background: rgba(100, 200, 255, 0.25);
      color: rgba(100, 200, 255, 0.9);
      border: 1px solid rgba(100, 200, 255, 0.3);
    }

    .tag-time {
      background: rgba(150, 100, 255, 0.25);
      color: rgba(150, 100, 255, 0.9);
      border: 1px solid rgba(150, 100, 255, 0.3);
    }

    .tag-level {
      background: rgba(100, 255, 150, 0.25);
      color: rgba(100, 255, 150, 0.9);
      border: 1px solid rgba(100, 255, 150, 0.3);
    }

    .tag-attribute {
      background: rgba(255, 100, 150, 0.25);
      color: rgba(255, 100, 150, 0.9);
      border: 1px solid rgba(255, 100, 150, 0.3);
    }

    .item-card-footer {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .topic-card-order {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
      background: rgba(100, 200, 255, 0.2);
      color: rgba(100, 200, 255, 0.95);
      border: 1px solid rgba(100, 200, 255, 0.35);
      margin-bottom: 10px;
      width: fit-content;
    }

    .topic-subtopics {
      margin: 10px 0 12px 16px;
      padding: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .topic-outline-card {
      grid-column: 1 / -1;
      padding: 20px;
      border: 1px solid rgba(122, 162, 255, 0.2);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(17, 26, 46, 0.7) 0%, rgba(17, 26, 46, 0.35) 100%);
    }

    .topic-outline-card h3 {
      margin: 0 0 12px;
      font-size: 16px;
      color: var(--accent2);
    }

    .topic-outline {
      margin: 0;
      padding-left: 20px;
      color: var(--text);
      line-height: 1.45;
      font-size: 13px;
    }

    .practicar-btn {
      padding: 10px 16px;
      background: rgba(122, 162, 255, 0.2);
      border: 1px solid rgba(122, 162, 255, 0.4);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
      flex: 1;
      text-align: center;
    }

    .practicar-btn:hover {
      background: rgba(122, 162, 255, 0.3);
      border-color: rgba(122, 162, 255, 0.6);
    }

    .checkmark {
      color: rgba(100, 255, 150, 0.8);
      font-size: 18px;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .index-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(122, 162, 255, 0.2);
        padding: 16px;
      }

      .items-grid {
        grid-template-columns: 1fr;
      }

      .main-content {
        padding: 16px;
      }

      .content-title {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

      </div>

      <div class="items-grid" id="itemsGrid">

    </main>
  </div>

      },
      {

    let currentMode = 'flashcards';
    let currentFlashCategory = 'verbos';
    let currentTopicKey = 'all';
    let currentTopicView = 'list';

    function renderTags(tags) {
      if (!tags) return '';
      let tagsHtml = '';
      
      if (tags.type) tagsHtml += `<span class="tag tag-type">${tags.type}</span>`;
      if (tags.verb) tagsHtml += `<span class="tag tag-verb">${tags.verb}</span>`;
      if (tags.complement) tagsHtml += `<span class="tag tag-complement">${tags.complement}</span>`;
      if (tags.time) tagsHtml += `<span class="tag tag-time">${tags.time}</span>`;
      if (tags.level) tagsHtml += `<span class="tag tag-level">${tags.level}</span>`;
      
      return tagsHtml;
    }

    function renderItems(categoryKey, searchTerm = '') {
      const itemsGrid = document.getElementById('itemsGrid');
      const titleElement = document.getElementById('categoryTitle');
      const subtitleElement = document.querySelector('.content-subtitle');

      if (categoryKey === 'verbos' && searchTerm.trim() === '') {
        titleElement.textContent = 'Verbos y formas verbales';
        itemsGrid.innerHTML = `
          <div class="embedded-view">
            <iframe src="./views/cat01.html" title="Categoria Verbos y formas verbales"></iframe>
          </div>
        `;
        return;
      }

      let filteredItems = [];
      let displayTitle = '';

      if (searchTerm.trim() !== '') {
        // Búsqueda global en todas las categorías
        displayTitle = 'Search Results';
        subtitleElement.textContent = `Mostrando resultados para "${searchTerm}"`;
        
        // Buscar en todas las categorías
        Object.values(categories).forEach(category => {
          category.items.forEach(item => {
            const titleMatch = item.name.toLowerCase().includes(searchTerm.toLowerCase());
            const tagsMatch = searchTermInTags(item.tags, searchTerm);
            
            if (titleMatch || tagsMatch) {
              filteredItems.push(item);
            }
          });
        });
      } else {
        // Vista normal de categoría
        const category = categories[categoryKey];
        displayTitle = category.title;
        subtitleElement.textContent = 'Selecciona un subtema para practicar.';
        filteredItems = category.items;
      }

      titleElement.textContent = displayTitle;

      itemsGrid.innerHTML = filteredItems.length === 0 
        ? '<p style="grid-column: 1/-1; color: var(--muted); text-align: center; padding: 40px 20px;">No se encontraron resultados</p>'
        : filteredItems
          .map(
            item => `
          <a href="${item.url}" class="item-card" style="text-decoration: none; color: inherit;">
            <div class="item-card-header">
              <p class="item-card-title">${item.name}</p>
              <p class="item-card-subtitle">${item.subtitle}</p>
            </div>
            <div class="item-card-tags">
              ${renderTags(item.tags)}
            </div>
            <div class="item-card-footer">
              <button class="practicar-btn" onclick="event.preventDefault(); window.location.href='${item.url}'">Practicar</button>
            </div>
          </a>
        `
          )
          .join('');
    }

    function renderTopicTags(tags) {
      return renderTags(tags);
    }

    function renderTopicSidebarButtons() {
      const topicList = document.getElementById('topicsCategoryList');
      const buttons = [
        '<button class="category-btn active" data-topic="all"><span class="category-icon">📚</span><span class="category-name">Todo el temario</span><span class="category-count">(14)</span></button>'
      ];

      topicSections.forEach(topic => {
        buttons.push(`
          <button class="category-btn" data-topic="${topic.key}">
            <span class="category-icon">${topic.icon}</span>
            <span class="category-name">${topic.order}: ${topic.name}</span>
          </button>
        `);
      });

      topicList.innerHTML = buttons.join('');
    }

    function openEmbeddedTopicByKey(topicKey) {
      const topic = topicSections.find(item => item.key === topicKey);
      if (!topic) {
        return;
      }

      const itemsGrid = document.getElementById('itemsGrid');
      const titleElement = document.getElementById('categoryTitle');
      const subtitleElement = document.querySelector('.content-subtitle');

      currentTopicView = 'detail';
      currentTopicKey = topicKey;
      titleElement.textContent = `${topic.order}: ${topic.name}`;
      subtitleElement.textContent = 'Vista embebida del tema dentro del panel principal.';

      itemsGrid.innerHTML = `
        <div class="embedded-topic-toolbar">
          <strong>Vista del tema</strong>
          <div class="embedded-topic-actions">
            <button class="embedded-topic-btn" id="backToTemarioListBtn">Volver al listado</button>
            <a class="embedded-topic-btn" href="${topic.url}" target="_blank" rel="noopener noreferrer">Abrir en pestaña nueva</a>
          </div>
        </div>
        <div class="embedded-view">
          <iframe src="${topic.url}" title="${topic.name}"></iframe>
        </div>
      `;

      const backButton = document.getElementById('backToTemarioListBtn');
      if (backButton) {
        backButton.addEventListener('click', () => {
          currentTopicView = 'list';
          currentTopicKey = 'all';
          document.querySelectorAll('#topicsCategoryList .category-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.topic === 'all');
          });
          renderTopicItems('', 'all');
        });
      }
    }

    function renderTopicItems(searchTerm = '', selectedTopic = 'all') {
      const itemsGrid = document.getElementById('itemsGrid');
      const titleElement = document.getElementById('categoryTitle');
      const subtitleElement = document.querySelector('.content-subtitle');

      currentTopicView = 'list';

      let filtered = topicSections;
      const search = searchTerm.trim().toLowerCase();

      if (selectedTopic !== 'all') {
        filtered = filtered.filter(topic => topic.key === selectedTopic);
      }

      if (search) {
        filtered = filtered.filter(topic => {
          const inOutline = topic.outline.some(item => item.toLowerCase().includes(search));
          return topic.name.toLowerCase().includes(search) || topic.subtitle.toLowerCase().includes(search) || inOutline;
        });
      }

      const selectedTopicData = topicSections.find(topic => topic.key === selectedTopic);
      titleElement.textContent = selectedTopicData ? `${selectedTopicData.order}: ${selectedTopicData.name}` : 'Temario A1 + anexos';
      subtitleElement.textContent = search
        ? `Resultados en temario para "${searchTerm}"`
        : selectedTopicData
          ? `Vista detallada del bloque ${selectedTopicData.order.toLowerCase()}.`
          : 'Selecciona un tema para abrir su pagina completa.';

      let outlineHtml = '';
      if (!search && selectedTopic === 'all') {
        outlineHtml = `
          <section class="topic-outline-card">
            <h3>Estructura completa del PDF</h3>
            <ol class="topic-outline">
              ${topicSections.map(topic => `<li>${topic.order}: ${topic.name}</li>`).join('')}
            </ol>
          </section>
        `;
      }

      const cardsHtml = filtered.length === 0
        ? '<p style="grid-column: 1/-1; color: var(--muted); text-align: center; padding: 40px 20px;">No se encontraron temas</p>'
        : filtered.map(topic => `
            <a href="${topic.url}" class="item-card" data-topic-open="${topic.key}" style="text-decoration: none; color: inherit;">
              <div class="item-card-header">
                <span class="topic-card-order">${topic.order}</span>
                <p class="item-card-title">${topic.name}</p>
                <p class="item-card-subtitle">${topic.subtitle}</p>
                <ul class="topic-subtopics">
                  ${topic.outline.slice(0, 4).map(point => `<li>${point}</li>`).join('')}
                </ul>
              </div>
              <div class="item-card-tags">
                ${renderTopicTags(topic.tags)}
              </div>
              <div class="item-card-footer">
                <button class="practicar-btn" onclick="event.preventDefault(); openEmbeddedTopicByKey('${topic.key}')">Abrir tema</button>
              </div>
            </a>
          `).join('');

      itemsGrid.innerHTML = outlineHtml + cardsHtml;
    }

    function setMode(mode) {
      currentMode = mode;
      const searchInput = document.getElementById('globalSearchInput');
      const sidebarTitle = document.getElementById('sidebarSectionTitle');
      const flashcardsList = document.getElementById('flashcardsCategoryList');
      const topicsList = document.getElementById('topicsCategoryList');

      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });

      searchInput.value = '';

      if (mode === 'flashcards') {
        sidebarTitle.textContent = 'Categorías';
        searchInput.placeholder = 'Buscar por título, tipo, verbo...';
        flashcardsList.classList.remove('hidden');
        topicsList.classList.add('hidden');
        renderItems(currentFlashCategory);
      } else {
        sidebarTitle.textContent = 'Temario';
        searchInput.placeholder = 'Buscar por tema o subtema...';
        flashcardsList.classList.add('hidden');
        topicsList.classList.remove('hidden');
        renderTopicItems('', currentTopicKey);
      }
    }

    function searchTermInTags(tags, searchTerm) {
      if (!tags) return false;
      const searchLower = searchTerm.toLowerCase();
      
      return (tags.type && tags.type.toLowerCase().includes(searchLower)) ||
             (tags.verb && tags.verb.toLowerCase().includes(searchLower)) ||
             (tags.complement && tags.complement.toLowerCase().includes(searchLower)) ||
             (tags.time && tags.time.toLowerCase().includes(searchLower)) ||
             (tags.level && tags.level.toLowerCase().includes(searchLower));
    }

    document.querySelector('.sidebar').addEventListener('click', function(event) {
      const modeButton = event.target.closest('.mode-btn');
      if (modeButton) {
        setMode(modeButton.dataset.mode);
        return;
      }

      const categoryButton = event.target.closest('#flashcardsCategoryList .category-btn');
      if (categoryButton && currentMode === 'flashcards') {
        document.querySelectorAll('#flashcardsCategoryList .category-btn').forEach(btn => btn.classList.remove('active'));
        categoryButton.classList.add('active');
        currentFlashCategory = categoryButton.dataset.category;
        document.getElementById('globalSearchInput').value = '';
        renderItems(currentFlashCategory);
        return;
      }

      const topicButton = event.target.closest('#topicsCategoryList .category-btn');
      if (topicButton && currentMode === 'temario') {
        document.querySelectorAll('#topicsCategoryList .category-btn').forEach(btn => btn.classList.remove('active'));
        topicButton.classList.add('active');
        currentTopicKey = topicButton.dataset.topic;
        document.getElementById('globalSearchInput').value = '';
        if (currentTopicKey === 'all') {
          renderTopicItems('', currentTopicKey);
        } else {
          openEmbeddedTopicByKey(currentTopicKey);
        }
        return;
      }

      const topicCard = event.target.closest('[data-topic-open]');
      if (topicCard && currentMode === 'temario') {
        event.preventDefault();
        openEmbeddedTopicByKey(topicCard.dataset.topicOpen);
      }
    });

    // Global search handler
    document.getElementById('globalSearchInput').addEventListener('input', function() {
      if (currentMode === 'flashcards') {
        renderItems(currentFlashCategory, this.value);
      } else {
        renderTopicItems(this.value, 'all');
      }
    });

    // Clear search button
    document.getElementById('clearSearchBtn').addEventListener('click', function() {
      const searchInput = document.getElementById('globalSearchInput');
      searchInput.value = '';
      searchInput.focus();
      
      if (currentMode === 'flashcards') {
        renderItems(currentFlashCategory);
      } else {
        if (currentTopicView === 'detail' && currentTopicKey !== 'all') {
          openEmbeddedTopicByKey(currentTopicKey);
        } else {
          renderTopicItems('', currentTopicKey);
        }
      }
    });

    renderTopicSidebarButtons();
    setMode('flashcards');
  </script>
</body>
